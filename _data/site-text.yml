    updated_label: "当前聚焦"
    learning_title: "最近在学"
    learning_body: "我最近在认真补强化学习，希望把它作为进入下一阶段科研与技术积累的一块更扎实的基础。"
    building_title: "最近在做"
    building_body: "我现在在做灵巧手手内旋转物体的任务。这个过程逼着我把具身智能、控制和实际实验之间的联系真正串起来。"
    writing_title: "最近准备写"
    writing_body: "我准备写一些和具身智能有关的内容，尽量从自己的理解过程出发，而不是只停留在概念层面的转述。"
    tracking_title: "最近在关注"
    tracking_body: "我最近持续关注具身智能的进展，以及大模型领域的发展，尤其是 AI Agent Coding 这一方向，想看它们怎样真正进入学习和科研工作流。"
    next_title: "接下来 1-2 个月"
    next_body: "接下来我想进一步补足具身智能所需的深度学习理论、控制知识、机器人运动学与动力学知识，并建立起一套完整可用的软硬件框架与实践能力。与此同时，我也想更深入地理解 AI Agent，并继续挖掘它在学习和科研中的潜力，让它真正成为高杠杆的工作伙伴。"
