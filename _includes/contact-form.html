{% assign current_lang = page.lang | default: 'en' %}
{% assign t = site.data.site-text[current_lang] | default: site.data.site-text.en %}
<form action="https://formspree.io/f/xzbnalkj" method="POST" class="neon-form" id="contact-form">
    <div class="form-header">
      <div class="pulse-dot"></div>
      <h3>📩 {{ t.contact.header }}</h3>
      <p>{{ t.contact.subheader }}</p>
    </div>
  
    <div class="form-grid">
      <div class="input-group">
        <div class="icon-container">
          <i class="fas fa-user-astronaut"></i>
        </div>
        <input type="text" 
               name="name" 
               class="form-input floating-input" 
               placeholder=" "
               required>
        <label class="floating-label">{{ t.contact.name }}</label>
      </div>
  
      <!-- 邮箱输入带验证反馈 -->
      <div class="input-group">
        <div class="icon-container">
          <i class="fas fa-space-shuttle"></i>
        </div>
        <input type="email" 
               name="_replyto" 
               class="form-input floating-input" 
               placeholder=" "
               required
               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
        <label class="floating-label">{{ t.contact.email }}</label>
        <div class="validation-feedback"></div>
      </div>
  
      <!-- 消息文本框带动态计数器 -->
      <div class="input-group message-group">
        <div class="icon-container">
          <i class="fas fa-comment-dots"></i>
        </div>
        <textarea name="content" 
                  class="form-input floating-input" 
                  placeholder=" "
                  rows="4"
                  maxlength="500"
                  required></textarea>
        <label class="floating-label">{{ t.contact.message }}</label>
        <div class="char-counter"><span>0</span>/500</div>
      </div>
    </div>
  
    <!-- 隐藏字段 -->
    <input type="hidden" name="_subject" value="🚀 {{ t.contact.subject }}">

    <input type="hidden" name="_next" value="?message={{ t.contact.success_redirect | uri_escape }}%20🛰️">
  
    <!-- 动态提交按钮 -->
    <button type="submit" class="submit-btn">
      <span class="btn-text">{{ t.contact.submit }}</span>
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <i class="fas fa-paper-plane"></i>
    </button>
  </form>
