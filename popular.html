---
layout: page
title: Most Popular
subtitle: Most viewed posts
---

<div class="popular-page">
  <div class="popular-intro">
    <p>Browse the most popular posts on this blog, ranked by view count.</p>
  </div>

  <div id="popular-list" class="popular-list">
    <div class="loading-indicator">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Loading posts...</span>
    </div>
  </div>
</div>

<script>
(function() {
  // Posts data from Jekyll (will be populated at build time via Jekyll variables)
  // Since this is a static site, we need to handle sorting client-side
  var posts = [
    {% for post in site.posts %}
      {
        title: {{ post.title | jsonify }},
        url: {{ post.url | jsonify }},
        date: {{ post.date | date: "%Y-%m-%d" | jsonify }},
        tags: {{ post.tags | jsonify }},
        excerpt: {{ post.excerpt | strip_html | truncate: 120 | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  // Get view count from localStorage
  function getViewCount(url) {
    var key = 'page_views_' + url;
    return parseInt(localStorage.getItem(key) || '0', 10);
  }

  // Add view counts to posts
  posts.forEach(function(post) {
    post.views = getViewCount(post.url);
  });

  // Sort by views descending
  posts.sort(function(a, b) {
    return b.views - a.views;
  });

  // Format number for display
  function formatNumber(num) {
    if (num >= 1000000) {
      return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    }
    if (num >= 1000) {
      return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    }
    return num.toString();
  }

  // Format date
  function formatDate(dateStr) {
    var date = new Date(dateStr);
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
  }

  // Render the list
  var container = document.getElementById('popular-list');

  if (posts.length === 0) {
    container.innerHTML = '<p class="no-posts">No posts found.</p>';
    return;
  }

  var html = '';
  posts.forEach(function(post, index) {
    var rankClass = '';
    if (index === 0) rankClass = 'rank-1';
    else if (index === 1) rankClass = 'rank-2';
    else if (index === 2) rankClass = 'rank-3';

    var tagsHtml = '';
    if (post.tags && post.tags.length > 0) {
      tagsHtml = '<div class="popular-tags">';
      post.tags.forEach(function(tag) {
        tagsHtml += '<span class="tag-pill">' + tag + '</span>';
      });
      tagsHtml += '</div>';
    }

    html +=
      '<article class="popular-item ' + rankClass + '">' +
        '<div class="popular-rank">' +
          '<span class="rank-number">' + (index + 1) + '</span>' +
        '</div>' +
        '<div class="popular-content">' +
          '<h2 class="popular-title">' +
            '<a href="' + post.url + '">' + post.title + '</a>' +
          '</h2>' +
          tagsHtml +
          '<p class="popular-excerpt">' + post.excerpt + '</p>' +
          '<div class="popular-meta">' +
            '<span class="popular-date"><i class="far fa-calendar"></i> ' + formatDate(post.date) + '</span>' +
            '<span class="popular-views"><i class="fas fa-eye"></i> ' + formatNumber(post.views) + ' views</span>' +
          '</div>' +
        '</div>' +
      '</article>';
  });

  container.innerHTML = html;
})();
</script>

<style>
  .popular-page {
    max-width: 800px;
    margin: 0 auto;
  }

  .popular-intro {
    text-align: center;
    margin-bottom: 2.5rem;
    color: #666;
    font-size: 1.1rem;
  }

  .loading-indicator {
    text-align: center;
    padding: 3rem;
    color: #888;
  }

  .loading-indicator i {
    margin-right: 0.5rem;
  }

  .popular-list {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .popular-item {
    display: flex;
    gap: 1.5rem;
    padding: 1.5rem;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 0.5rem;
    transition: all 0.3s ease;
  }

  .popular-item:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    transform: translateY(-2px);
  }

  .popular-item.rank-1 {
    border-left: 4px solid #ffd700;
    background: linear-gradient(to right, rgba(255, 215, 0, 0.05), transparent);
  }

  .popular-item.rank-2 {
    border-left: 4px solid #c0c0c0;
    background: linear-gradient(to right, rgba(192, 192, 192, 0.05), transparent);
  }

  .popular-item.rank-3 {
    border-left: 4px solid #cd7f32;
    background: linear-gradient(to right, rgba(205, 127, 50, 0.05), transparent);
  }

  .popular-rank {
    flex-shrink: 0;
    width: 3rem;
    height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    border-radius: 50%;
  }

  .rank-1 .popular-rank {
    background: linear-gradient(135deg, #ffd700, #ffed4a);
    color: #fff;
    font-weight: 700;
  }

  .rank-2 .popular-rank {
    background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
    color: #fff;
    font-weight: 700;
  }

  .rank-3 .popular-rank {
    background: linear-gradient(135deg, #cd7f32, #daa06d);
    color: #fff;
    font-weight: 700;
  }

  .rank-number {
    font-family: 'Open Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
  }

  .popular-content {
    flex: 1;
    min-width: 0;
  }

  .popular-title {
    font-family: 'Open Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
    line-height: 1.3;
  }

  .popular-title a {
    color: #404040;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .popular-title a:hover {
    color: #008AFF;
  }

  .popular-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .tag-pill {
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    background: #f0f0f0;
    color: #666;
    border-radius: 1rem;
    font-family: 'Open Sans', sans-serif;
  }

  .popular-excerpt {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.6;
    margin: 0 0 1rem;
  }

  .popular-meta {
    display: flex;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: #888;
    font-family: 'Open Sans', sans-serif;
  }

  .popular-meta span {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  .popular-meta i {
    color: #008AFF;
  }

  .popular-views {
    font-weight: 600;
    color: #008AFF;
  }

  [data-theme="dark"] .popular-intro {
    color: #aaa;
  }

  [data-theme="dark"] .popular-item {
    background: #1e1e1e;
    border-color: #333;
  }

  [data-theme="dark"] .popular-rank {
    background: #333;
  }

  [data-theme="dark"] .popular-title a {
    color: #e0e0e0;
  }

  [data-theme="dark"] .tag-pill {
    background: #333;
    color: #aaa;
  }

  [data-theme="dark"] .popular-excerpt {
    color: #aaa;
  }

  [data-theme="dark"] .popular-meta {
    color: #888;
  }

  @media (max-width: 576px) {
    .popular-item {
      flex-direction: column;
      gap: 1rem;
    }

    .popular-rank {
      width: 2.5rem;
      height: 2.5rem;
    }

    .rank-number {
      font-size: 1rem;
    }

    .popular-meta {
      flex-direction: column;
      gap: 0.5rem;
    }
  }
</style>
